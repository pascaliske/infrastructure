---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: github
  namespace: flux-system
spec:
  providerRef:
    name: github
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: "*"
      matchLabels:
        kustomize.toolkit.fluxcd.io/name: flux-system
    - kind: HelmRelease
      name: "*"
