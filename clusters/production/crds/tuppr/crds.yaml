---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tuppr-crds
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: tuppr-source
  interval: 15m
  prune: false
  healthChecks:
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: kubernetesupgrades.tuppr.home-operations.com
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: talosupgrades.tuppr.home-operations.com
