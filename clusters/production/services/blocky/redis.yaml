---
apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: redis
  namespace: blocky
  labels:
    redis-failover.freshworks.com/operator-group: main
spec:
  redis:
    image: redis:8.8.0-alpine
    replicas: 3
    exporter:
      enabled: true
      image: oliver006/redis_exporter:v1.85.0-alpine
    securityContext:
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 400m
        memory: 500Mi
  sentinel:
    image: redis:8.8.0-alpine
    replicas: 3
    exporter:
      enabled: true
      image: oliver006/redis_exporter:v1.85.0-alpine
    securityContext:
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 400m
        memory: 500Mi
